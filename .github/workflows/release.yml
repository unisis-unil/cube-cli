name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cube-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cube-aarch64-apple-darwin
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: cube-x86_64-unknown-linux-musl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign binary (macOS only)
        if: contains(matrix.target, 'apple-darwin')
        run: codesign -s - target/${{ matrix.target }}/release/cube

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz cube
          cd ../../..
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Compute SHA256 checksums
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-musl; do
            URL="https://github.com/${REPO}/releases/download/${TAG}/cube-${target}.tar.gz"
            SHA=$(curl -fsSL "${URL}" | shasum -a 256 | awk '{print $1}')
            KEY=$(echo "${target}" | tr '-' '_')
            echo "sha256_${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v5
        with:
          repository: unisis-unil/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ steps.sha.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_INTEL_MAC: ${{ steps.sha.outputs.sha256_x86_64_apple_darwin }}
          SHA_ARM_MAC: ${{ steps.sha.outputs.sha256_aarch64_apple_darwin }}
          SHA_LINUX: ${{ steps.sha.outputs.sha256_x86_64_unknown_linux_musl }}
        run: |
          cat > Formula/cube.rb << RUBY
          class Cube < Formula
            desc "CLI pour interroger les cubes SQLite UNISIS S3 (Statistiques en Self-Service)"
            homepage "https://github.com/unisis-unil/cube-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/unisis-unil/cube-cli/releases/download/${TAG}/cube-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL_MAC}"
              end

              on_arm do
                url "https://github.com/unisis-unil/cube-cli/releases/download/${TAG}/cube-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/unisis-unil/cube-cli/releases/download/${TAG}/cube-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "cube"
            end

            test do
              assert_match "cube", shell_output("#{bin}/cube --version")
            end
          end
          RUBY
          sed -i 's/^          //' Formula/cube.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cube.rb
          git commit -m "cube ${{ steps.sha.outputs.version }}"
          git push
