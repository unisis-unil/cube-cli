name: Update Homebrew formula

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-musl; do
            URL="https://github.com/${REPO}/releases/download/${TAG}/cube-${target}.tar.gz"
            SHA=$(curl -fsSL "${URL}" | shasum -a 256 | awk '{print $1}')
            KEY=$(echo "${target}" | tr '-' '_')
            echo "sha256_${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v5
        with:
          repository: unisis-unil/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tools

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_INTEL_MAC: ${{ steps.release.outputs.sha256_x86_64_apple_darwin }}
          SHA_ARM_MAC: ${{ steps.release.outputs.sha256_aarch64_apple_darwin }}
          SHA_LINUX: ${{ steps.release.outputs.sha256_x86_64_unknown_linux_musl }}
        run: |
          cat > homebrew-tools/Formula/cube.rb << EOF
          class Cube < Formula
            desc "CLI pour interroger les cubes SQLite UNISIS S3 (Statistiques en Self-Service)"
            homepage "https://github.com/unisis-unil/cube-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/unisis-unil/cube-cli/releases/download/${TAG}/cube-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL_MAC}"
              end

              on_arm do
                url "https://github.com/unisis-unil/cube-cli/releases/download/${TAG}/cube-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/unisis-unil/cube-cli/releases/download/${TAG}/cube-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "cube"
            end

            test do
              assert_match "cube", shell_output("#{bin}/cube --version")
            end
          end
          EOF

      - name: Remove leading whitespace
        run: sed -i 's/^          //' homebrew-tools/Formula/cube.rb

      - name: Commit and push
        working-directory: homebrew-tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cube.rb
          git commit -m "cube ${VERSION}"
          git push
